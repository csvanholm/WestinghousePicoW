name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi

      - name: Verify pinned Pico SDK submodule
        run: |
          test -f third_party/pico-sdk/pico_sdk_init.cmake || (echo "Missing third_party/pico-sdk submodule" && exit 1)

      - name: Configure RP2040
        env:
          WIFI_SSID: ci-placeholder
          WIFI_PASSWORD: ci-placeholder
          SENDER_EMAIL: ci@example.com
          SENDER_PASSWORD: ci-placeholder
        run: cmake -S . -B build -G Ninja -DPICO_BOARD=pico_w -DCMAKE_BUILD_TYPE=Debug

      - name: Build RP2040
        run: cmake --build build --parallel

      - name: Configure RP2350
        env:
          WIFI_SSID: ci-placeholder
          WIFI_PASSWORD: ci-placeholder
          SENDER_EMAIL: ci@example.com
          SENDER_PASSWORD: ci-placeholder
        run: cmake -S . -B build-rp2350 -G Ninja -DPICO_BOARD=pico2_w -DCMAKE_BUILD_TYPE=Debug

      - name: Build RP2350
        run: cmake --build build-rp2350 --parallel
